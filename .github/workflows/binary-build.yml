name: Binary Build and Release

on:
  push:
    branches: [ "pyinstaller-binary" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "pyinstaller-binary" ]

jobs:
  build-binary:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          ca-certificates \
          wget \
          curl \
          git \
          gcc \
          g++ \
          python3-dev
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt
        pip install pyinstaller pyinstaller-hooks-contrib
    
    - name: Build binary with PyInstaller
      run: |
        python build-simple.py
    
    - name: Test binary
      run: |
        echo "Testing binary..."
        ./dist/web-dl-manager --version || true
        echo "Binary test completed"
    
    - name: Create release archive
      run: |
        mkdir -p release
        cp dist/web-dl-manager release/
        cp -r app/templates release/
        cp entrypoint.sh release/
        cp Dockerfile.binary release/
        cp README.md release/
        
        # Create tar archive
        tar -czf web-dl-manager-binary.tar.gz -C release .
        
        # Create zip archive
        cd release && zip -r ../web-dl-manager-binary.zip . && cd ..
        
        echo "Release archives created"
        ls -lh *.tar.gz *.zip
    
    - name: Upload binary artifacts
      uses: actions/upload-artifact@v3
      with:
        name: web-dl-manager-binary
        path: |
          dist/web-dl-manager
          web-dl-manager-binary.tar.gz
          web-dl-manager-binary.zip
        retention-days: 7
    
    - name: Get version from tag
      if: startsWith(github.ref, 'refs/tags/')
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          web-dl-manager-binary.tar.gz
          web-dl-manager-binary.zip
        name: Release ${{ steps.get_version.outputs.VERSION }}
        draft: false
        prerelease: false
  
  docker-build-binary:
    runs-on: ubuntu-latest
    needs: build-binary
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Download binary artifact
      uses: actions/download-artifact@v3
      with:
        name: web-dl-manager-binary
        path: dist/
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=sha,prefix=binary-,format=short
    
    - name: Build and push Docker image (binary version)
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.binary
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
    
    - name: Docker image test
      run: |
        # Pull and test the binary image
        docker pull ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
        docker run --rm ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }} --version || true